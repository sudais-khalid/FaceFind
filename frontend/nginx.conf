server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing (React Router): let unknown paths fall back to
    # index.html instead of nginx's default 404, so direct links to
    # /scan, /results, /dashboard work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
