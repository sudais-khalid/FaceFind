# Production stack. Differences from docker-compose.yml (local dev):
#   - no bind mounts / --reload / npm run dev - runs the built images as-is
#   - db/redis are not exposed to the host, only reachable on the compose network
#   - frontend is the nginx-served static build (Dockerfile.prod), not the vite dev server
#   - restart policies so a crashed container comes back on its own
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: facefind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: facefind_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facefind"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./keys:/app/keys:ro
      - ./models:/app/models:ro
      - faiss_indexes:/app/faiss_indexes
    environment:
      - DATABASE_URL=postgresql+asyncpg://facefind:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/facefind_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - APP_ENV=production
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    volumes:
      - ./keys:/app/keys:ro
      - ./models:/app/models:ro
      - faiss_indexes:/app/faiss_indexes
    environment:
      - DATABASE_URL=postgresql+asyncpg://facefind:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/facefind_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - APP_ENV=production
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  postgres_data:
  faiss_indexes:
